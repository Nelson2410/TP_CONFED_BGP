!===================================================================
!     --- CONFIGURATION DE R2 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R2
interface Ethernet0/0
 description vers-R1
 ip address 10.0.1.2 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R3
 ip address 10.0.1.9 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/0/1
! (si nécessaire : adapter selon image IOS)
exit
!
interface Loopback0
 ip address 2.2.2.2 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65000
 bgp router-id 2.2.2.2
 neighbor 10.0.1.1 remote-as 65000
 neighbor 10.0.1.10 remote-as 65000
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R2 ----
!===================================================================