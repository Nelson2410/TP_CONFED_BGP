!===================================================================
!     --- CONFIGURATION DE R10 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R10
interface Ethernet0/0
 description vers-R1 (backbone)
 ip address 10.0.0.1 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-WEB-SRV (LAN)
 ip address 192.168.60.1 255.255.255.0
 no shutdown
exit
!
interface Loopback0
 ip address 10.10.10.10 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65060
 bgp router-id 10.10.10.10
 neighbor 10.0.0.2 remote-as 65000
 network 192.168.60.0 mask 255.255.255.0
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R10 ----
!===================================================================