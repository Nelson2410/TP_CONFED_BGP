!===================================================================
!     --- CONFIGURATION DE R3 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R3
interface Ethernet0/0
 description vers-R1
 ip address 10.0.1.6 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R2
 ip address 10.0.1.10 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/2
 description vers-R11 (AS65070)
 ip address 10.0.4.1 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 3.3.3.3 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65000
 bgp router-id 3.3.3.3
 neighbor 10.0.1.5 remote-as 65000
 neighbor 10.0.1.9 remote-as 65000
 neighbor 10.0.4.2 remote-as 65070
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R3 ----
!===================================================================