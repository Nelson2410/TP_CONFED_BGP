!===================================================================
!     --- CONFIGURATION DE R11 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R11
interface Ethernet0/0
 description vers-R3
 ip address 10.0.4.2 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-PC1 (LAN)
 ip address 192.168.70.1 255.255.255.0
 no shutdown
exit
!
interface Loopback0
 ip address 11.11.11.11 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65070
 bgp router-id 11.11.11.11
 neighbor 10.0.4.1 remote-as 65000
 network 192.168.70.0 mask 255.255.255.0
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R11 ----
!===================================================================