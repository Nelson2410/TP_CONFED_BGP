!===================================================================
!     --- CONFIGURATION DE R4 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R4
interface Ethernet0/0
 description vers-R1 (AS65000)
 ip address 10.0.0.6 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R5 (sub-AS65011)
 ip address 10.0.2.1 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/2
 description vers-R6 (sub-AS65011)
 ip address 10.0.2.5 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/3
 description vers-R7 (confederation backbone)
 ip address 10.0.0.9 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 4.4.4.4 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65011
 bgp confederation identifier 65010
 bgp confederation peers 65012
 bgp router-id 4.4.4.4
 neighbor 10.0.0.5 remote-as 65000
 neighbor 10.0.0.10 remote-as 65012
 neighbor 10.0.2.2 remote-as 65011
 neighbor 10.0.2.6 remote-as 65011
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R4 ----
!===================================================================