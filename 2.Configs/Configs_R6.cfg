!===================================================================
!     --- CONFIGURATION DE R6 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R6
interface Ethernet0/0
 description vers-R5
 ip address 10.0.2.10 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R4
 ip address 10.0.2.6 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 6.6.6.6 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65011
 bgp confederation identifier 65010
 bgp confederation peers 65012
 bgp router-id 6.6.6.6
 neighbor 10.0.2.5 remote-as 65011
 neighbor 10.0.2.9 remote-as 65011
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R6 ----
!===================================================================