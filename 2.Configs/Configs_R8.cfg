!===================================================================
!     --- CONFIGURATION DE R8 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R8
interface Ethernet0/0
 description vers-R7
 ip address 10.0.3.6 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R9
 ip address 10.0.3.9 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/2
 description vers-R13 (AS65090)
 ip address 10.0.5.1 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 8.8.8.8 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65012
 bgp confederation identifier 65010
 bgp confederation peers 65011
 bgp router-id 8.8.8.8
 neighbor 10.0.3.5 remote-as 65012
 neighbor 10.0.3.10 remote-as 65012
 neighbor 10.0.5.2 remote-as 65090
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R8 ----
!===================================================================