!===================================================================
!     --- CONFIGURATION DE R9 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R9
interface Ethernet0/0
 description vers-R8
 ip address 10.0.3.10 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R7
 ip address 10.0.3.2 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 9.9.9.9 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65012
 bgp confederation identifier 65010
 bgp confederation peers 65011
 bgp router-id 9.9.9.9
 neighbor 10.0.3.1 remote-as 65012
 neighbor 10.0.3.9 remote-as 65012
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R9 ----
!===================================================================