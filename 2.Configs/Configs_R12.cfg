!===================================================================
!     --- CONFIGURATION DE R12 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R12
interface Ethernet0/0
 description vers-R7
 ip address 10.0.0.14 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-FTP-SRV (LAN)
 ip address 192.168.80.1 255.255.255.0
 no shutdown
exit
!
interface Loopback0
 ip address 12.12.12.12 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65080
 bgp router-id 12.12.12.12
 neighbor 10.0.0.13 remote-as 65010
 network 192.168.80.0 mask 255.255.255.0
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R12 ----
!===================================================================