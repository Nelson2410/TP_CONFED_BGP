!===================================================================
!     --- CONFIGURATION DE R5 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R5
interface Ethernet0/0
 description vers-R6
 ip address 10.0.2.9 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R4
 ip address 10.0.2.2 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65011
 bgp confederation identifier 65010
 bgp confederation peers 65012
 bgp router-id 5.5.5.5
 neighbor 10.0.2.1 remote-as 65011
 neighbor 10.0.2.10 remote-as 65011
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R5 ----
!===================================================================