!===================================================================
!     --- CONFIGURATION DE R13 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R13
interface Ethernet0/0
 description vers-R8
 ip address 10.0.5.2 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-PC2 (LAN)
 ip address 192.168.90.1 255.255.255.0
 no shutdown
exit
!
interface Loopback0
 ip address 13.13.13.13 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65090
 bgp router-id 13.13.13.13
 neighbor 10.0.5.1 remote-as 65012
 network 192.168.90.0 mask 255.255.255.0
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R13 ----
!===================================================================