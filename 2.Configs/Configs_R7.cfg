!===================================================================
!     --- CONFIGURATION DE R7 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R7
interface Ethernet0/0
 description vers-R4 (backbone)
 ip address 10.0.0.10 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R9 (sub-AS65012)
 ip address 10.0.3.1 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/2
 description vers-R8 (sub-AS65012)
 ip address 10.0.3.5 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 7.7.7.7 255.255.255.255
exit
!
interface Ethernet0/3
 description vers-R12 (AS65080)
 ip address 10.0.0.13 255.255.255.252
 no shutdown
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65012
 bgp confederation identifier 65010
 bgp confederation peers 65011
 bgp router-id 7.7.7.7
 neighbor 10.0.0.9 remote-as 65011
 neighbor 10.0.0.14 remote-as 65080
 neighbor 10.0.3.2 remote-as 65012
 neighbor 10.0.3.6 remote-as 65012
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R7 ----
!===================================================================