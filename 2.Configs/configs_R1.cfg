!===================================================================
!     --- CONFIGURATION DE R1 ----
!===================================================================
!
!*******************************************************************
! --- CONFIGURATION DES INTERFACES ---
!*******************************************************************
!
enable
configure terminal
hostname R1
interface Ethernet0/0
 description vers-R10 (AS65060)
 ip address 10.0.0.2 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/3
 description vers-R4 (confederation)
 ip address 10.0.0.5 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/1
 description vers-R2
 ip address 10.0.1.1 255.255.255.252
 no shutdown
exit
!
interface Ethernet0/2
 description vers-R3
 ip address 10.0.1.5 255.255.255.252
 no shutdown
exit
!
interface Loopback0
 ip address 1.1.1.1 255.255.255.255
exit
!
!********************************************************************
! --- CONFIGURATION DU PROCESSUS DE ROUTAGE BGP ---
!********************************************************************
!
router bgp 65000
 bgp router-id 1.1.1.1
 neighbor 10.0.0.1 remote-as 65060
 neighbor 10.0.0.6 remote-as 65010
 neighbor 10.0.1.2 remote-as 65000
 neighbor 10.0.1.6 remote-as 65000
 no auto-summary
exit
end
write memory
!
!===================================================================
!     --- FIN DE CONFIGURATION DE R1 ----
!===================================================================